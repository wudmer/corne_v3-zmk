# --- Prospector display ---
# Ambient light sensor is OFF by default so this builds whether or not your
# Prospector has the APDS9960 fitted. If you DID install the sensor and want
# auto-brightness, set the first line to =y and remove the fixed brightness line.
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80
# Uncomment if the display is mounted upside-down for your desk orientation:
# CONFIG_PROSPECTOR_ROTATE_DISPLAY_180=y

# Status screen layout (Classic is the default). Uncomment one to change:
# CONFIG_PROSPECTOR_STATUS_SCREEN_RADII=y
# CONFIG_PROSPECTOR_STATUS_SCREEN_FIELD=y
# CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y

# --- ZMK Studio (runs on the central = dongle) ---
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# --- BLE ---
# Boost TX power to match the halves' corne.conf setting.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
