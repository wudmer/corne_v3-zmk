# This file generates the GitHub Actions matrix.
#
# Dongle-as-central setup (Prospector):
#   - The Prospector dongle (XIAO nRF52840) is the CENTRAL and holds the keymap.
#   - Both Corne halves are PERIPHERALS (forced via cmake-args).
#   - Flash settings_reset to ALL three devices first, then the real firmware.
---
include:
  # --- Prospector dongle = central (holds the keymap + Studio) ---
  - board: seeeduino_xiao_ble
    shield: clover_dongle prospector_adapter
    snippet: studio-rpc-usb-uart

  # --- Corne halves = peripherals ---
  - board: nice_nano_v2
    shield: corne_left nice_oled
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nice_nano_v2
    shield: corne_right nice_oled
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # --- Reset firmware (flash first, to clear old pairings) ---
  - board: nice_nano_v2
    shield: settings_reset
  - board: seeeduino_xiao_ble
    shield: settings_reset
